<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mini-armonic</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #05040a;
      color: #e6e1f0;
      font-family: 'SF Mono', Consolas, Monaco, monospace;
      overflow: hidden;
    }
    canvas { display: block; }
    #overlay {
      position: fixed;
      top: 12px; left: 12px;
      max-width: 420px;
      background: rgba(10, 8, 18, 0.82);
      border: 1px solid rgba(160, 130, 255, 0.25);
      border-radius: 10px;
      padding: 14px 16px;
      pointer-events: none;
      backdrop-filter: blur(4px);
      font-size: 12px;
      line-height: 1.45;
    }
    #overlay h1 {
      font-size: 15px;
      color: #c4a8ff;
      margin-bottom: 8px;
      letter-spacing: 0.08em;
    }
    #overlay .row { display: flex; justify-content: space-between; gap: 16px; }
    #overlay .label { color: #8f85a8; }
    #overlay .value { color: #fff; text-align: right; }
    #overlay .padgrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
      margin-top: 8px;
    }
    #overlay .pad {
      padding: 4px 2px;
      text-align: center;
      border-radius: 4px;
      background: rgba(120, 90, 200, 0.12);
      border: 1px solid rgba(120, 90, 200, 0.2);
    }
    #overlay .pad.active { background: rgba(160, 130, 255, 0.45); border-color: #c4a8ff; }
    #start {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 18px 36px;
      font-size: 16px;
      background: linear-gradient(135deg, #2a1f4d, #150f2a);
      color: #e6e1f0;
      border: 1px solid rgba(160, 130, 255, 0.4);
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.05em;
      z-index: 10;
    }
    #start:hover { background: linear-gradient(135deg, #362760, #1d1538); }
    #start.hidden { display: none; }
  </style>
</head>
<body>
  <button id="start">INICIAR mini-armonic</button>
  <div id="overlay">
    <h1>mini-armonic</h1>
    <div class="row"><span class="label">audio</span><span class="value" id="audio-status">off</span></div>
    <div class="row"><span class="label">MIDI</span><span class="value" id="midi-status">no device</span></div>
    <div class="row"><span class="label">f0</span><span class="value" id="p-f0">110.0 Hz</span></div>
    <div class="row"><span class="label">armónicos</span><span class="value" id="p-harm">5</span></div>
    <div class="row"><span class="label">spread</span><span class="value" id="p-spread">0.85</span></div>
    <div class="row"><span class="label">ratio Lissajous</span><span class="value" id="p-ratio">3 : 2</span></div>
    <div class="row"><span class="label">fase</span><span class="value" id="p-phase">0.00</span></div>
    <div class="row"><span class="label">volumen</span><span class="value" id="p-vol">0.50</span></div>
    <div class="row"><span class="label">perturbación</span><span class="value" id="p-pert">0.00</span></div>
    <div class="row"><span class="label">preset</span><span class="value" id="p-preset">—</span></div>
    <div class="padgrid" id="padgrid"></div>
  </div>
  <canvas id="cv"></canvas>

<script>
window.onerror = function(msg, src, line, col, err) {
  console.error('[mini-armonic error]', msg, 'line', line, 'col', col, err);
  return false;
};
</script>

<script>
/* ============================================================
   mini-armonic — generador de campos armónicos controlado por MIDI
   Basado en Harmonic Information Theory (Mariano Fernández Méndez)
   ============================================================ */

// --- configuración global --------------------------------------------------
const CONFIG = {
  f0: 110.0,              // fundamental (Hz)
  harmonics: 5,           // cantidad de parciales enteros
  spread: 0.85,           // caída de amplitud por parcial (1/n^spread)
  ratioX: 3,              // numerador Lissajous
  ratioY: 2,              // denominador Lissajous
  phase: 0.0,             // fase XY (0..2π)
  volume: 0.50,           // master gain
  perturb: 0.0,           // desafinación phi/noble mezclada
  waveform: 'sine',
  activePreset: null,
  midiDebug: []
};

// mapeo de pads (note -> preset)
const PAD_PRESETS = {
  36: { name: 'drone 1:1', ratioX: 1, ratioY: 1, harmonics: 5, spread: 0.9 },
  37: { name: 'octava 1:2', ratioX: 1, ratioY: 2, harmonics: 6, spread: 0.8 },
  38: { name: 'quinta 2:3', ratioX: 2, ratioY: 3, harmonics: 6, spread: 0.8 },
  39: { name: 'cuarta 3:4', ratioX: 3, ratioY: 4, harmonics: 6, spread: 0.8 },
  40: { name: 'sexta 3:5', ratioX: 3, ratioY: 5, harmonics: 7, spread: 0.75 },
  41: { name: 'tercera 4:5', ratioX: 4, ratioY: 5, harmonics: 7, spread: 0.75 },
  42: { name: 'phi-offset', ratioX: 1, ratioY: 1.618033988749895, harmonics: 8, spread: 0.7 },
  43: { name: 'noble 1:φ²', ratioX: 1, ratioY: 2.618033988749895, harmonics: 8, spread: 0.65 }
};

// knobs por defecto del Minilab 3 (factory preset)
const KNOB_CCS = [86, 87, 89, 90, 110, 111, 116, 117];
// fallback para preset Analog Lab / User MIDI
const KNOB_CCS_ALT = [21, 22, 23, 24, 25, 26, 27, 28];

function knobIndex(cc) {
  let i = KNOB_CCS.indexOf(cc);
  if (i >= 0) return i;
  return KNOB_CCS_ALT.indexOf(cc);
}

// --- audio -----------------------------------------------------------------
let audioCtx = null;
let masterGain = null;
let analyser = null;
let oscillators = [];    // { osc, gain, n }
let lissX = null;        // oscilador visible X
let lissY = null;        // oscilador visible Y

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = CONFIG.volume;
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.85;
  masterGain.connect(analyser);
  try {
    analyser.connect(audioCtx.destination);
  } catch (e) {
    console.warn('No se pudo conectar al dispositivo de salida de audio:', e.message);
  }
  rebuildField();
  document.getElementById('audio-status').textContent = 'running';
}

function dBToGain(db) { return Math.pow(10, db / 20); }

function rebuildField() {
  if (!audioCtx) return;
  // limpiar osciladores anteriores
  for (const o of oscillators) { o.osc.stop(); o.osc.disconnect(); o.gain.disconnect(); }
  oscillators = [];
  if (lissX) { lissX.stop(); lissX.disconnect(); lissX = null; }
  if (lissY) { lissY.stop(); lissY.disconnect(); lissY = null; }

  const now = audioCtx.currentTime;

  // osciladores del campo armónico: f0 * n
  for (let n = 1; n <= CONFIG.harmonics; n++) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = CONFIG.waveform;
    const freq = CONFIG.f0 * n;
    osc.frequency.setValueAtTime(freq, now);
    const amp = Math.pow(n, -CONFIG.spread) * (1 / CONFIG.harmonics);
    gain.gain.setValueAtTime(amp, now);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(now);
    oscillators.push({ osc, gain, n, freq });
  }

  // osciladores dedicados al Lissajous (audibles pero con su propia ganancia)
  lissX = audioCtx.createOscillator();
  lissY = audioCtx.createOscillator();
  const glx = audioCtx.createGain();
  const gly = audioCtx.createGain();
  lissX.type = CONFIG.waveform;
  lissY.type = CONFIG.waveform;
  const fx = CONFIG.f0 * CONFIG.ratioX;
  const fy = CONFIG.f0 * CONFIG.ratioY;
  lissX.frequency.setValueAtTime(fx, now);
  lissY.frequency.setValueAtTime(fy, now);
  glx.gain.setValueAtTime(0.08, now);
  gly.gain.setValueAtTime(0.08, now);
  lissX.connect(glx); glx.connect(masterGain);
  lissY.connect(gly); gly.connect(masterGain);
  lissX.start(now);
  lissY.start(now);

  applyVolume();
}

function updateFrequencies() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  // actualizar campo
  for (const o of oscillators) {
    const f = CONFIG.f0 * o.n;
    o.freq = f;
    o.osc.frequency.setTargetAtTime(f, now, 0.02);
  }
  // actualizar Lissajous
  if (lissX) lissX.frequency.setTargetAtTime(CONFIG.f0 * CONFIG.ratioX, now, 0.02);
  if (lissY) lissY.frequency.setTargetAtTime(CONFIG.f0 * CONFIG.ratioY, now, 0.02);
}

function updateGains() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  for (const o of oscillators) {
    const amp = Math.pow(o.n, -CONFIG.spread) * (1 / Math.max(1, CONFIG.harmonics));
    o.gain.gain.setTargetAtTime(amp, now, 0.05);
  }
}

function applyVolume() {
  if (!masterGain) return;
  const now = audioCtx.currentTime;
  masterGain.gain.setTargetAtTime(Math.max(0, Math.min(1, CONFIG.volume)), now, 0.02);
}

// --- MIDI ------------------------------------------------------------------
let midiAccess = null;

function initMIDI() {
  if (!navigator.requestMIDIAccess) {
    document.getElementById('midi-status').textContent = 'Web MIDI no soportado';
    return;
  }
  navigator.requestMIDIAccess({ sysex: false })
    .then(acc => {
      midiAccess = acc;
      const inputs = Array.from(midiAccess.inputs.values());
      inputs.forEach(input => {
        input.onmidimessage = handleMIDIMessage;
      });
      const names = inputs.map(i => i.name).join(', ') || 'no inputs';
      document.getElementById('midi-status').textContent = names;
    })
    .catch(err => {
      document.getElementById('midi-status').textContent = 'error: ' + err.message;
    });
}

function handleMIDIMessage(msg) {
  const d = msg.data;
  const status = d[0] & 0xF0;
  const ch = (d[0] & 0x0F) + 1;
  const note = d[1];
  const vel = d[2];

  // log corto para debug
  CONFIG.midiDebug.unshift(`${status.toString(16).toUpperCase()} ch${ch} ${note}=${vel}`);
  if (CONFIG.midiDebug.length > 6) CONFIG.midiDebug.pop();

  if (status === 0xB0) { // CC
    const idx = knobIndex(note);
    const v = vel / 127;
    if (idx === 0) CONFIG.f0 = 50 + v * 350;                 // 50..400 Hz
    if (idx === 1) CONFIG.harmonics = 1 + Math.round(v * 15); // 1..16
    if (idx === 2) CONFIG.spread = 0.2 + v * 1.8;             // 0.2..2.0
    if (idx === 3) CONFIG.ratioX = 1 + Math.round(v * 7);     // 1..8
    if (idx === 4) CONFIG.ratioY = 1 + Math.round(v * 7);     // 1..8
    if (idx === 5) CONFIG.phase = v * Math.PI * 2;
    if (idx === 6) CONFIG.volume = v;
    if (idx === 7) CONFIG.perturb = v;

    if (idx >= 0) {
      if (idx === 0 || idx === 3 || idx === 4 || idx === 5 || idx === 7) updateFrequencies();
      if (idx === 1 || idx === 2) { updateGains(); if (idx === 1) rebuildField(); }
      if (idx === 6) applyVolume();
      updateUI();
    }
    return;
  }

  if (status === 0x90 && vel > 0) { // Note On
    if (PAD_PRESETS[note]) {
      applyPreset(note);
      updateUI();
    }
    return;
  }
}

function applyPreset(note) {
  const p = PAD_PRESETS[note];
  if (!p) return;
  CONFIG.ratioX = p.ratioX;
  CONFIG.ratioY = p.ratioY;
  CONFIG.harmonics = p.harmonics;
  CONFIG.spread = p.spread;
  CONFIG.activePreset = note;
  // actualizar frecuencias y ganancias sin recrear todo si solo cambian ratios/spread
  updateFrequencies();
  updateGains();
}

// --- UI --------------------------------------------------------------------
function updateUI() {
  document.getElementById('p-f0').textContent = CONFIG.f0.toFixed(1) + ' Hz';
  document.getElementById('p-harm').textContent = CONFIG.harmonics;
  document.getElementById('p-spread').textContent = CONFIG.spread.toFixed(2);
  document.getElementById('p-ratio').textContent = `${CONFIG.ratioX} : ${CONFIG.ratioY}`;
  document.getElementById('p-phase').textContent = CONFIG.phase.toFixed(2);
  document.getElementById('p-vol').textContent = CONFIG.volume.toFixed(2);
  document.getElementById('p-pert').textContent = CONFIG.perturb.toFixed(2);
  const preset = CONFIG.activePreset ? PAD_PRESETS[CONFIG.activePreset].name : '—';
  document.getElementById('p-preset').textContent = preset;

  // marcar pad activo
  document.querySelectorAll('.pad').forEach(el => el.classList.remove('active'));
  if (CONFIG.activePreset) {
    const el = document.getElementById('pad-' + CONFIG.activePreset);
    if (el) el.classList.add('active');
  }
}

function buildPadGrid() {
  const grid = document.getElementById('padgrid');
  const notes = Object.keys(PAD_PRESETS).map(Number).sort((a, b) => a - b);
  for (const note of notes) {
    const div = document.createElement('div');
    div.className = 'pad';
    div.id = 'pad-' + note;
    div.textContent = PAD_PRESETS[note].name.split(' ')[0];
    div.title = PAD_PRESETS[note].name;
    grid.appendChild(div);
  }
}

// --- visualización ---------------------------------------------------------
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
let lissPoints = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let freqData = null;

function drawSpectrum(w, h) {
  if (!analyser) return;
  if (!freqData || freqData.length !== analyser.frequencyBinCount) {
    freqData = new Uint8Array(analyser.frequencyBinCount);
  }
  const pad = 14;
  const bw = (w / 3 - pad * 2) / 64;
  const baseX = pad;
  const baseY = h - pad;
  const maxH = h * 0.35;

  analyser.getByteFrequencyData(freqData);

  // fondo del panel
  ctx.fillStyle = 'rgba(20, 16, 35, 0.45)';
  ctx.fillRect(baseX - pad, baseY - maxH - pad, w / 3, maxH + pad * 2);
  ctx.strokeStyle = 'rgba(160, 130, 255, 0.2)';
  ctx.strokeRect(baseX - pad, baseY - maxH - pad, w / 3, maxH + pad * 2);

  ctx.fillStyle = '#c4a8ff';
  ctx.font = '11px monospace';
  ctx.fillText('ESPECTRO + RATIOS', baseX, baseY - maxH - 4);

  const sr = audioCtx ? audioCtx.sampleRate : 48000;
  const binHz = sr / analyser.fftSize;

  for (let i = 0; i < 64; i++) {
    const binStart = Math.floor(i * 2.5);
    let sum = 0;
    for (let k = 0; k < 2; k++) sum += freqData[binStart + k] || 0;
    const val = sum / 2;
    const barH = (val / 255) * maxH;
    const x = baseX + i * (bw + 1);
    const y = baseY - barH;

    const hue = 260 + (val / 255) * 80;
    ctx.fillStyle = `hsla(${hue}, 80%, 65%, ${0.4 + val / 255 * 0.6})`;
    ctx.fillRect(x, y, bw, barH);

    // etiquetar picos cercanos a armónicos
    const freq = binStart * binHz;
    if (val > 120 && CONFIG.f0 > 0) {
      const ratio = freq / CONFIG.f0;
      const rounded = Math.round(ratio);
      if (Math.abs(ratio - rounded) < 0.08 && rounded >= 1 && rounded <= CONFIG.harmonics) {
        ctx.fillStyle = '#fff';
        ctx.fillText('' + rounded, x, y - 4);
      }
    }
  }
}

function drawLissajous(w, h) {
  const cx = w * 0.5;
  const cy = h * 0.5;
  const radius = Math.min(w, h) * 0.28;

  // panel
  ctx.fillStyle = 'rgba(20, 16, 35, 0.4)';
  ctx.beginPath();
  ctx.arc(cx, cy, radius + 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(160, 130, 255, 0.18)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // generar puntos
  const dt = 0.004;
  const t = performance.now() / 1000;
  const steps = 400;
  const fx = CONFIG.ratioX;
  const fy = CONFIG.ratioY;
  const ph = CONFIG.phase + CONFIG.perturb * Math.PI * 0.5;

  // agregar punto nuevo
  const x = Math.sin(t * fx * Math.PI * 2 + ph);
  const y = Math.sin(t * fy * Math.PI * 2);
  lissPoints.push({ x, y, age: 0 });
  if (lissPoints.length > steps) lissPoints.shift();

  for (let i = 0; i < lissPoints.length; i++) lissPoints[i].age++;

  // dibujar trayectoria con fade
  ctx.beginPath();
  for (let i = 0; i < lissPoints.length - 1; i++) {
    const p = lissPoints[i];
    const alpha = 1 - p.age / steps;
    ctx.strokeStyle = `hsla(${260 + alpha * 80}, 85%, 70%, ${alpha})`;
    ctx.lineWidth = 1 + alpha * 2;
    ctx.beginPath();
    ctx.moveTo(cx + p.x * radius, cy + p.y * radius);
    ctx.lineTo(cx + lissPoints[i + 1].x * radius, cy + lissPoints[i + 1].y * radius);
    ctx.stroke();
  }

  ctx.fillStyle = '#fff';
  ctx.font = '12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`LISSAJOUS  ${fx} : ${fy.toFixed(3)}`, cx, cy - radius - 24);
  ctx.textAlign = 'left';
}

function drawHarmonicCircle(w, h) {
  const panelW = w / 3 - 28;
  const cx = w - panelW / 2 - 14;
  const cy = h * 0.5;
  const r = Math.min(panelW, h * 0.28) * 0.5;

  // panel
  ctx.fillStyle = 'rgba(20, 16, 35, 0.45)';
  ctx.fillRect(w - panelW - 14, cy - r - 40, panelW, r * 2 + 80);
  ctx.strokeStyle = 'rgba(160, 130, 255, 0.2)';
  ctx.strokeRect(w - panelW - 14, cy - r - 40, panelW, r * 2 + 80);

  ctx.fillStyle = '#c4a8ff';
  ctx.font = '11px monospace';
  ctx.fillText('CÍRCULO ARMÓNICO', w - panelW - 6, cy - r - 24);

  // círculo base
  ctx.strokeStyle = 'rgba(160, 130, 255, 0.15)';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();

  // puntos proporcionales
  for (let n = 1; n <= CONFIG.harmonics; n++) {
    const angle = (Math.log2(n) * Math.PI * 2) % (Math.PI * 2);
    const dist = r * (0.25 + 0.75 * Math.pow(n, -CONFIG.spread));
    const px = cx + Math.cos(angle) * dist;
    const py = cy + Math.sin(angle) * dist;

    ctx.fillStyle = `hsla(${260 + n * 20}, 80%, 70%, 0.9)`;
    ctx.beginPath();
    ctx.arc(px, py, 3 + Math.pow(n, -CONFIG.spread) * 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '9px monospace';
    ctx.fillText('1:' + n, px + 8, py + 3);
  }

  // centro f0
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillText('f0', cx + 8, cy + 3);
}

function drawDebug() {
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'right';
  const x = canvas.width - 14;
  let y = canvas.height - 14;
  for (const line of CONFIG.midiDebug) {
    ctx.fillText(line, x, y);
    y -= 13;
  }
  ctx.textAlign = 'left';
}

function loop() {
  // fondo con trail sutil
  ctx.fillStyle = 'rgba(5, 4, 10, 0.35)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawLissajous(canvas.width, canvas.height);
  drawSpectrum(canvas.width, canvas.height);
  drawHarmonicCircle(canvas.width, canvas.height);
  drawDebug();

  requestAnimationFrame(loop);
}

// --- inicio ----------------------------------------------------------------
document.getElementById('start').addEventListener('click', () => {
  initAudio();
  initMIDI();
  document.getElementById('start').classList.add('hidden');
  updateUI();
});

buildPadGrid();
updateUI();
loop();
</script>
</body>
</html>
